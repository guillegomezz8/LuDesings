{% extends "base.html" %}
{% load static %}
{% block contenido %}
<div class="container auth-page">
    <section class="auth-card auth-card-wide">
        <form method="post" class="auth-form">
            {% csrf_token %}
            <h1 class="contenido auth-title">Crear cuenta</h1>
            {{ form.as_p }}
            <button type="submit" class="contenido lu-btn auth-submit">Crear cuenta</button>
            <div class="auth-link">
                <span>¿Ya tienes cuenta?</span>
                <a class="contenido" href="{% url 'login' %}">Entrar</a>
            </div>
        </form>
    </section>
</div>
<link rel="stylesheet" href="{% static 'css/pages/autenticacion.css' %}"/>
{% endblock %}
