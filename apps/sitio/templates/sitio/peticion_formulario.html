{% extends "base.html" %}
{%load static%}
{% block contenido %}
<div class="container a-medida-page">
    <div class="row gx-5 align-items-start">
        <div class="col-md-5 mb-4">
            <div class="contenedor-personalizado a-medida-info">
                <h2 class="contenido">Cómo funciona</h2>
                <div class="a-medida-pasos">
                    <article>
                        <span class="contenido">01</span>
                        <strong class="contenido">Comparte tu idea</strong>
                    </article>
                    <article>
                        <span class="contenido">02</span>
                        <strong class="contenido">Valoramos el proyecto</strong>
                    </article>
                    <article>
                        <span class="contenido">03</span>
                        <strong class="contenido">Lo concretamos contigo</strong>
                    </article>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="mb-5 contenedor-personalizado">
                <div class="a-medida-form-heading">
                    <h2 class="contenido">Cuéntanos tu proyecto</h2>
                </div>
                <form method="post" class="a-medida-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="text-center mt-4 pt-2 align-items-center">
                        <button type="submit" class="contenido lu-btn">Enviar mi idea</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="{% static 'css/pages/formularios.css' %}?v=compact-a-medida-2"/>
{%endblock%}
