<section class="stock-editor" data-stock-editor hidden>
    <div class="stock-editor-heading">
        <div>
            <h3 class="contenido">Tallas y unidades</h3>
            <p>Añade solo las tallas que vas a vender. El stock se actualiza por separado para cada una.</p>
        </div>
        <button type="button" class="contenido stock-add-custom" data-add-custom>+ Talla personalizada</button>
    </div>
    <div class="stock-presets" aria-label="Tallas habituales">
        <button type="button" data-preset-size="XS">XS</button>
        <button type="button" data-preset-size="S">S</button>
        <button type="button" data-preset-size="M">M</button>
        <button type="button" data-preset-size="L">L</button>
        <button type="button" data-preset-size="XL">XL</button>
        <button type="button" data-preset-size="XXL">XXL</button>
        <button type="button" data-preset-size="34">34</button>
        <button type="button" data-preset-size="36">36</button>
        <button type="button" data-preset-size="38">38</button>
        <button type="button" data-preset-size="40">40</button>
        <button type="button" data-preset-size="42">42</button>
        <button type="button" data-preset-size="44">44</button>
        <button type="button" data-preset-size="46">46</button>
    </div>
    <div class="stock-size-list" data-stock-size-list></div>
    <p class="stock-editor-empty" data-stock-empty>Selecciona una talla habitual o añade una personalizada.</p>
</section>
