{% extends "base.html" %}
{% load static %}
{% block contenido %}
<div class="container auth-page">
    <section class="auth-card">
        <aside class="auth-side">
            <p class="contenido lu-kicker">Área cliente</p>
            <h1 class="contenido">Entrar</h1>
            <p>Accede para ver tus pedidos, guardar favoritos y reutilizar tus datos en futuras compras.</p>
        </aside>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="divider d-flex align-items-center my-4">
                <h4 class="contenido text-center fw-bold mx-3 mb-0">Inicio de Sesión</h4>
            </div>

            <label for="username" class="contenido">Usuario</label>
            <input type="text" id="username" name="username" class="form-control form-control-lg" placeholder="Introduce tu usuario" autocomplete="username" required>

            <label for="password" class="contenido">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Introduce tu contraseña" autocomplete="current-password" required>

            <button type="submit" value="Login" class="contenido lu-btn auth-submit">Entrar</button>
            <div class="auth-link">
                <span>¿Primera vez?</span>
                <a class="contenido" href="{% url 'registro' %}">Crear cuenta de cliente</a>
            </div>
        </form>
    </section>
</div>
<link rel="stylesheet" href="{% static 'css/login.css' %}"/>
{% endblock %}
